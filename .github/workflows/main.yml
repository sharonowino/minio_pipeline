name: Transit Sentinel GTFS Pipeline

on:
  schedule:
    - cron: "*/15 * * * *"   # Runs every 15 min
  workflow_dispatch:       # Allows manual run

jobs:
  gtfs-pipeline:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install pandas requests gtfs-realtime-bindings minio pyarrow 

    - name: Run GTFS ingestion script
      env:
        MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
        MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
        MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        MINIO_SECURE: ${{ secrets.MINIO_SECURE }}
        GTFS_SERVICE_ALERTS_URL: ${{ vars.SERVICE_ALERTS_URL }}
        GTFS_TRIP_UPDATES_URL: ${{ vars.TRIP_UPDATES_URL }}
        GTFS_VEHICLE_URL: ${{ vars.VEHICLE_URL }}
      run: |
        python upload_script.py
